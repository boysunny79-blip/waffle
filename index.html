<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YT Keyword Analyzer - 유튜브 키워드 분석기</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <!-- API Key Modal -->
  <div class="modal-overlay" id="apiKeyModal">
    <div class="modal">
      <div class="modal-header">
        <span class="modal-icon">🔑</span>
        <h2>YouTube API 키 설정</h2>
      </div>
      <p class="modal-desc">YouTube Data API v3 키를 입력해주세요.<br>
        <a href="https://console.cloud.google.com/apis/credentials" target="_blank" class="modal-link">Google Cloud Console</a>에서 발급받을 수 있습니다.
      </p>
      <input type="text" id="apiKeyInput" class="modal-input" placeholder="AIzaSy...">
      <button class="btn-modal-save" id="saveApiKey">저장 후 시작</button>
      <p class="modal-note">* API 키는 브라우저 로컬스토리지에만 저장됩니다.</p>
    </div>
  </div>

  <!-- Loading Overlay -->
  <div class="loading-overlay hidden" id="loadingOverlay">
    <div class="loading-spinner"></div>
    <p class="loading-text" id="loadingText">검색 중...</p>
  </div>

  <div class="app">
    <!-- Sidebar: Recent Searches -->
    <aside class="sidebar">
      <div class="sidebar-logo">
        <span class="logo-icon">📊</span>
        <span class="logo-text">YT Analyzer</span>
      </div>
      <div class="sidebar-api-status" id="apiStatus">
        <span class="api-dot disconnected"></span>
        <span class="api-label">API 미연결</span>
      </div>
      <div class="nav-section-title">최근 검색</div>
      <ul id="recentSearches" class="recent-list">
        <li class="empty-state">검색 기록 없음</li>
      </ul>
      <div class="sidebar-footer">
        <button class="btn-settings" id="openSettings">⚙️ API 설정</button>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="main">
      <!-- Search Bar -->
      <div class="search-bar">
        <div class="search-input-wrap">
          <svg class="search-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
          </svg>
          <input type="text" id="searchInput" placeholder="키워드를 입력하세요 (Enter로 검색)">
        </div>
        <button class="btn-search" id="searchBtn">검색</button>
      </div>

      <!-- Related Keywords Bar -->
      <div class="keyword-bar hidden" id="keywordBar">
        <span class="keyword-bar-label">연관 키워드</span>
        <div class="keyword-chips" id="keywordChips"></div>
      </div>

      <!-- Stats Summary -->
      <div class="stats-summary hidden" id="statsSummary">
        <div class="summary-item">
          <span class="summary-value" id="totalResults">0</span>
          <span class="summary-label">검색 결과</span>
        </div>
        <div class="summary-item">
          <span class="summary-value accent-red" id="avgGrowth">0%</span>
          <span class="summary-label">평균 떡상 지수</span>
        </div>
        <div class="summary-item">
          <span class="summary-value" id="totalViews">0</span>
          <span class="summary-label">총 조회수</span>
        </div>
        <div class="summary-item">
          <span class="summary-value" id="topGrowthName">-</span>
          <span class="summary-label">🏆 떡상 1위</span>
        </div>
        <div class="summary-spacer"></div>
        <button class="btn-export" id="exportCsv">📥 CSV 다운로드</button>
      </div>

      <!-- Sort Bar -->
      <div class="sort-bar hidden" id="sortBar">
        <div class="sort-buttons">
          <button class="sort-btn active" data-sort="growth">🔥 떡상지수순</button>
          <button class="sort-btn" data-sort="views">👁 조회수순</button>
          <button class="sort-btn" data-sort="subs">👥 구독자순</button>
          <button class="sort-btn" data-sort="date">🕐 최신순</button>
        </div>
        <button class="btn-order" id="orderBtn">▼ 내림차순</button>
      </div>

      <!-- Video Cards Grid -->
      <div class="video-grid" id="videoGrid">
        <div class="empty-results">
          <div class="empty-icon">🎬</div>
          <p>키워드를 검색하면<br>영상 분석 결과가 표시됩니다</p>
        </div>
      </div>
    </main>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <script src="app.js"></script>
</body>
</html>
